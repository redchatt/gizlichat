<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Admin - Escobar Export</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Admin Panel</h2>
        <input type="text" id="nc" maxlength="6" placeholder="Yeni 6 rəqəmli kod">
        <input type="number" id="nb" placeholder="Balans">
        <button onclick="add()">Hesabı Yarat</button>
        <hr>
        <button onclick="exportData()" style="background:#2980b9;">MƏLUMATI PAYLAŞ (WhatsApp üçün)</button>
        <p style="font-size: 11px; color: #888;">Bu düyməyə basanda çıxan kodu kopyalayıb dostuna göndər.</p>
    </div>

    <script>
        function add() {
            let c = document.getElementById('nc').value;
            let b = parseFloat(document.getElementById('nb').value) || 0;
            if(c.length !== 6) return alert("6 rəqəm olmalıdır!");
            
            let accs = JSON.parse(localStorage.getItem('game_accounts')) || {};
            accs[c] = { balance: b };
            localStorage.setItem('game_accounts', JSON.stringify(accs));
            alert("Yaradıldı! İndi 'Paylaş' düyməsinə basıb kodu dostuna göndər.");
        }

        function exportData() {
            let data = localStorage.getItem('game_accounts');
            if(!data) return alert("Hələ heç bir hesab yaratmamısınız!");
            
            // Kodu ekrana çıxarırıq ki kopyalasın
            let tempInput = document.createElement("textarea");
            tempInput.value = data;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            alert("Bütün hesab məlumatları kopyalandı! İndi WhatsApp-da dostuna yapışdırıb göndər.");
        }
    </script>
</body>
</html>
